# ────────────────────────────────────────────────────────────────────────────
# I4 포함 모델용 파라미터 config (19 features: I2–I20 + I4)
# ────────────────────────────────────────────────────────────────────────────

csv_name: traindataset.csv

input_columns:
  - I2
  - I3
  - I4
  - I5
  - I6
  - I7
  - I8
  - I9
  - I10
  - I11
  - I12
  - I13
  - I14
  - I15
  - I16
  - I17
  - I18
  - I19
  - I20

label_column: abnormality

output_dir: train_results
project_name: train

randomforest:
  n_estimators: 100
  max_depth: 3
  min_samples_split: 4

xgboost:
  n_estimators: 100
  max_depth: 4
  learning_rate: 0.05

svm:
  C: 1.0
  gamma: scale

logistic_regression:
  C: 1.0
  max_iter: 1000

neural_network:
  hidden_layer_sizes: [64, 32]
  max_iter: 500
  alpha: 0.001

n_splits: 5
random_state: 42
